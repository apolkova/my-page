<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <meta
      name="description"
      content="Interactive desktop portfolio of Adéla Polková, software engineering student and junior software engineer."
    />

    <title>Adéla Polková — Portfolio</title>

    <link
      rel="stylesheet"
      href="./css/style.css"
    />
  </head>

  <body>
    <header
      class="menubar"
      aria-label="Application menu"
    >
      <button
        class="brand-button"
        type="button"
        data-menu="brand"
        aria-label="Portfolio menu"
      >
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            d="M16.365 1.43c0 1.14-.46 2.24-1.2 3.03-.79.85-2.07 1.5-3.09 1.42-.13-1.11.42-2.27 1.14-3.02.8-.83 2.16-1.47 3.15-1.43zM20.5 17.5c-.55 1.26-.81 1.82-1.52 2.94-.99 1.55-2.39 3.48-4.12 3.5-1.54.02-1.94-1-4.03-.99-2.09.01-2.52 1.01-4.06.99C5.04 23.9 3.7 22.16 2.7 20.62c-2.78-4.3-3.08-9.36-1.36-12.05.98-1.53 2.54-2.44 4-2.44 1.49 0 2.42.82 3.66.82 1.2 0 1.94-.82 3.66-.82 1.3 0 2.68.71 3.66 1.94-3.22 1.77-2.7 6.37.18 8.43z"
          />
        </svg>
      </button>

      <span class="name">Adéla</span>

      <button
        class="menu-trigger"
        type="button"
        data-menu="file"
      >
        File
      </button>

      <button
        class="menu-trigger"
        type="button"
        data-menu="edit"
      >
        Edit
      </button>

      <button
        class="menu-trigger"
        type="button"
        data-menu="view"
      >
        View
      </button>

      <button
        class="menu-trigger"
        type="button"
        data-menu="window"
      >
        Window
      </button>

      <button
        class="menu-trigger"
        type="button"
        data-menu="help"
      >
        Help
      </button>

      <span class="spacer">
        <span id="clock">—</span>
      </span>
    </header>

    <div
      id="menu-layer"
      aria-live="polite"
    ></div>

    <main
      id="desktop"
      aria-label="Portfolio desktop"
    ></main>

    <nav
      class="dock"
      aria-label="Portfolio applications"
    >
      <a
        class="dock-app"
        href="https://github.com/apolkova"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open GitHub"
      >
        <span class="tip">GitHub</span>

        <svg
          viewBox="0 0 64 64"
          aria-hidden="true"
        >
          <rect
            width="64"
            height="64"
            rx="14"
            fill="#1a1a1a"
          />

          <path
            fill="#fff"
            d="M32 12c-11 0-20 9-20 20 0 9 6 16 14 19 1 0 1-1 1-1v-4c-6 1-7-3-7-3-1-2-2-3-2-3-2-1 0-1 0-1 2 0 3 2 3 2 2 3 5 2 6 2 0-2 1-3 2-3-5-1-9-3-9-10 0-2 1-4 2-5 0-1-1-3 0-6 0 0 2 0 5 3 2-1 3-1 5-1s3 0 5 1c3-3 5-3 5-3 1 3 0 5 0 6 1 1 2 3 2 5 0 7-4 9-9 10 1 1 2 2 2 4v6s0 1 1 1c8-3 14-10 14-19 0-11-9-20-20-20z"
          />
        </svg>
      </a>

      <a
        class="dock-app"
        href="https://www.linkedin.com/in/ad%C3%A9la-polkov%C3%A1-642144382/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open LinkedIn"
      >
        <span class="tip">LinkedIn</span>

        <svg
          viewBox="0 0 64 64"
          aria-hidden="true"
        >
          <rect
            width="64"
            height="64"
            rx="14"
            fill="#0A66C2"
          />

          <path
            fill="#fff"
            d="M20 26h6v22h-6zM23 16a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7zM30 26h6v3c1-2 4-4 7-4 7 0 8 5 8 10v13h-6V37c0-3 0-6-4-6s-5 3-5 6v11h-6z"
          />
        </svg>
      </a>

      <button
        type="button"
        data-app="mail"
        aria-label="Open email"
      >
        <span class="tip">Mail</span>

        <svg
          viewBox="0 0 64 64"
          aria-hidden="true"
        >
          <defs>
            <linearGradient
              id="mail-gradient"
              x1="0"
              x2="0"
              y1="0"
              y2="1"
            >
              <stop
                offset="0"
                stop-color="#63c8ff"
              />

              <stop
                offset="1"
                stop-color="#1c8eea"
              />
            </linearGradient>
          </defs>

          <rect
            width="64"
            height="64"
            rx="14"
            fill="url(#mail-gradient)"
          />

          <path
            d="M12 22l20 14 20-14v22c0 2-2 4-4 4H16c-2 0-4-2-4-4z"
            fill="#fff"
          />

          <path
            d="M12 20c0-2 2-4 4-4h32c2 0 4 2 4 4L32 34z"
            fill="#eaf6ff"
          />
        </svg>
      </button>

      <button
        type="button"
        data-app="gallery"
        aria-label="Open gallery"
      >
        <span class="tip">Gallery</span>

        <svg
          viewBox="0 0 64 64"
          aria-hidden="true"
        >
          <rect
            width="64"
            height="64"
            rx="14"
            fill="#ff7ab6"
          />

          <rect
            x="10"
            y="14"
            width="44"
            height="32"
            rx="4"
            fill="#fff"
          />

          <circle
            cx="22"
            cy="24"
            r="4"
            fill="#ffcf3e"
          />

          <path
            d="M14 42l10-12 8 8 8-6 10 12z"
            fill="#5AB7FF"
          />
        </svg>
      </button>

      <button
        type="button"
        data-app="notes"
        aria-label="Open notes"
      >
        <span class="tip">Notes</span>

        <svg
          viewBox="0 0 64 64"
          aria-hidden="true"
        >
          <rect
            width="64"
            height="64"
            rx="14"
            fill="#ffd257"
          />

          <rect
            x="14"
            y="12"
            width="36"
            height="42"
            rx="3"
            fill="#fffbea"
          />

          <g
            stroke="#c69a12"
            stroke-width="1.6"
            stroke-linecap="round"
          >
            <line
              x1="20"
              y1="22"
              x2="44"
              y2="22"
            />

            <line
              x1="20"
              y1="28"
              x2="44"
              y2="28"
            />

            <line
              x1="20"
              y1="34"
              x2="44"
              y2="34"
            />

            <line
              x1="20"
              y1="40"
              x2="36"
              y2="40"
            />
          </g>
        </svg>
      </button>
    </nav>

    <template id="svg-folder">
      <svg
        viewBox="0 0 64 64"
        class="art"
        aria-hidden="true"
      >
        <defs>
          <linearGradient
            id="folder-gradient"
            x1="0"
            x2="0"
            y1="0"
            y2="1"
          >
            <stop
              offset="0"
              stop-color="#5AB7FF"
            />

            <stop
              offset="1"
              stop-color="#2E7BD6"
            />
          </linearGradient>
        </defs>

        <path
          d="M6 18c0-3 2-5 5-5h14l4 5h24c3 0 5 2 5 5v25c0 3-2 5-5 5H11c-3 0-5-2-5-5V18z"
          fill="url(#folder-gradient)"
        />

        <path
          d="M6 24h52v3H6z"
          fill="#1E5FA8"
          opacity=".4"
        />
      </svg>
    </template>

    <template id="svg-doc">
      <svg
        viewBox="0 0 64 64"
        class="art"
        aria-hidden="true"
      >
        <path
          d="M14 6h26l12 12v40c0 2-2 4-4 4H14c-2 0-4-2-4-4V10c0-2 2-4 4-4z"
          fill="#fff"
        />

        <path
          d="M40 6v12h12z"
          fill="#d0d7e2"
        />

        <g
          stroke="#8894a8"
          stroke-width="1.6"
          stroke-linecap="round"
        >
          <line
            x1="18"
            y1="28"
            x2="46"
            y2="28"
          />

          <line
            x1="18"
            y1="34"
            x2="46"
            y2="34"
          />

          <line
            x1="18"
            y1="40"
            x2="46"
            y2="40"
          />

          <line
            x1="18"
            y1="46"
            x2="36"
            y2="46"
          />
        </g>
      </svg>
    </template>

    <template id="svg-note">
      <svg
        viewBox="0 0 64 64"
        class="art"
        aria-hidden="true"
      >
        <path
          d="M14 6h26l12 12v40c0 2-2 4-4 4H14c-2 0-4-2-4-4V10c0-2 2-4 4-4z"
          fill="#fffbea"
        />

        <path
          d="M40 6v12h12z"
          fill="#e6d9a2"
        />

        <g
          stroke="#c69a12"
          stroke-width="1.6"
          stroke-linecap="round"
        >
          <line
            x1="18"
            y1="28"
            x2="46"
            y2="28"
          />

          <line
            x1="18"
            y1="34"
            x2="46"
            y2="34"
          />

          <line
            x1="18"
            y1="40"
            x2="46"
            y2="40"
          />

          <line
            x1="18"
            y1="46"
            x2="36"
            y2="46"
          />
        </g>
      </svg>
    </template>

    <template id="svg-cv">
      <svg
        viewBox="0 0 64 64"
        class="art"
        aria-hidden="true"
      >
        <path
          d="M14 6h26l12 12v40c0 2-2 4-4 4H14c-2 0-4-2-4-4V10c0-2 2-4 4-4z"
          fill="#fff"
        />

        <path
          d="M40 6v12h12z"
          fill="#d0d7e2"
        />

        <circle
          cx="32"
          cy="30"
          r="6"
          fill="#5AB7FF"
        />

        <path
          d="M20 48c0-6 6-10 12-10s12 4 12 10v2H20z"
          fill="#5AB7FF"
        />
      </svg>
    </template>

  
    <script
      type="module"
      src="./js/script.js"
    ></script>
  </body>
</html>
